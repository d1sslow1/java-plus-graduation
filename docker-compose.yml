services:
  main-db:
    image: postgres:16.1
    container_name: postgres-main-db
    ports:
      - "6542:5432"
    environment:
      - POSTGRES_DB=main-db
      - POSTGRES_USER=ewm
      - POSTGRES_PASSWORD=ewm
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ewm -d main-db"]
      interval: 5s
      timeout: 5s
      retries: 5

  stats-db:
    image: postgres:16.1
    container_name: postgres-stats-db
    ports:
      - "6541:5432"
    environment:
      - POSTGRES_DB=stats-db
      - POSTGRES_USER=ewm
      - POSTGRES_PASSWORD=ewm
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ewm -d stats-db"]
      interval: 5s
      timeout: 5s
      retries: 5

  stats-server:
    build: ./stat/stat-server
    container_name: stats-server
    ports:
      - "9090:9090"
    depends_on:
      stats-db:
        condition: service_healthy
    environment:
      - SERVER_PORT=9090
      - SPRING_DATASOURCE_URL=jdbc:postgresql://stats-db:5432/stats-db
      - SPRING_DATASOURCE_USERNAME=ewm
      - SPRING_DATASOURCE_PASSWORD=ewm
      - SPRING_CLOUD_CONFIG_ENABLED=false
      - EUREKA_CLIENT_ENABLED=false

  ewm-service:
    build: ./core/main-service
    container_name: ewm-service
    ports:
      - "8080:8080"
    depends_on:
      main-db:
        condition: service_healthy
      stats-server:
        condition: service_started
    environment:
      - SERVER_PORT=8080
      - SPRING_DATASOURCE_URL=jdbc:postgresql://main-db:5432/main-db
      - SPRING_DATASOURCE_USERNAME=ewm
      - SPRING_DATASOURCE_PASSWORD=ewm
      - SPRING_CLOUD_CONFIG_ENABLED=false
      - EUREKA_CLIENT_ENABLED=false
      - STAT_SERVER_URL=http://stats-server:9090